<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fluid Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #080a0f;
–panel-bg: rgba(10, 13, 20, 0.92);
–border: rgba(255,255,255,0.08);
–accent: #00e5ff;
–accent2: #ff3d7f;
–text: #e0e6f0;
–muted: #5a6480;
–track: rgba(255,255,255,0.06);
–thumb: var(–accent);
–panel-w: 280px;
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
overflow: hidden;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
}

canvas {
display: block;
width: 100vw;
height: 100vh;
touch-action: none;
}

/* ── PANEL ── */
#panel {
position: fixed;
top: 0; right: 0;
width: var(–panel-w);
height: 100%;
background: var(–panel-bg);
border-left: 1px solid var(–border);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
display: flex;
flex-direction: column;
z-index: 100;
transition: transform 0.35s cubic-bezier(0.77,0,0.175,1);
overflow: hidden;
}
#panel.hidden { transform: translateX(100%); }

#panel-header {
padding: 18px 18px 14px;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}
#panel-header h1 {
font-family: ‘Space Mono’, monospace;
font-size: 11px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 2px;
}
#panel-header p {
font-size: 11px;
color: var(–muted);
}

#panel-body {
flex: 1;
overflow-y: auto;
padding: 10px 0;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}
#panel-body::-webkit-scrollbar { width: 4px; }
#panel-body::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.section {
padding: 6px 18px 10px;
border-bottom: 1px solid var(–border);
}
.section:last-child { border-bottom: none; }

.section-title {
font-family: ‘Space Mono’, monospace;
font-size: 9px;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
margin-top: 4px;
}

.row {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 10px;
gap: 8px;
}
.row label {
font-size: 12px;
color: var(–text);
white-space: nowrap;
flex-shrink: 0;
min-width: 90px;
}
.row .val {
font-family: ‘Space Mono’, monospace;
font-size: 10px;
color: var(–accent);
min-width: 36px;
text-align: right;
flex-shrink: 0;
}

input[type=range] {
-webkit-appearance: none;
appearance: none;
flex: 1;
height: 3px;
background: var(–track);
border-radius: 2px;
outline: none;
cursor: pointer;
min-width: 0;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 13px; height: 13px;
border-radius: 50%;
background: var(–accent);
box-shadow: 0 0 8px var(–accent);
cursor: pointer;
transition: transform 0.1s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); }
input[type=range]::-moz-range-thumb {
width: 13px; height: 13px;
border-radius: 50%;
background: var(–accent);
border: none;
cursor: pointer;
}

.btn-row {
display: flex;
gap: 6px;
flex-wrap: wrap;
}
.btn {
flex: 1;
min-width: 60px;
padding: 7px 8px;
border: 1px solid var(–border);
background: rgba(255,255,255,0.03);
color: var(–text);
font-family: ‘Space Mono’, monospace;
font-size: 9px;
letter-spacing: 0.1em;
text-transform: uppercase;
border-radius: 4px;
cursor: pointer;
transition: all 0.15s;
text-align: center;
}
.btn:hover { background: rgba(255,255,255,0.08); border-color: var(–accent); color: var(–accent); }
.btn.active { background: rgba(0,229,255,0.12); border-color: var(–accent); color: var(–accent); box-shadow: 0 0 12px rgba(0,229,255,0.2); }
.btn.danger { border-color: var(–accent2); color: var(–accent2); }
.btn.danger:hover { background: rgba(255,61,127,0.1); }

.colorpicker-row {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 10px;
flex-wrap: wrap;
}
.colorpicker-row label { font-size: 12px; min-width: 80px; }
.swatch {
width: 22px; height: 22px;
border-radius: 4px;
border: 2px solid transparent;
cursor: pointer;
transition: transform 0.1s, border-color 0.1s;
flex-shrink: 0;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: white; }

.toggle-row {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 10px;
}
.toggle-row label { font-size: 12px; }
.toggle {
width: 36px; height: 20px;
background: var(–track);
border-radius: 10px;
position: relative;
cursor: pointer;
transition: background 0.2s;
border: 1px solid var(–border);
flex-shrink: 0;
}
.toggle.on { background: rgba(0,229,255,0.25); border-color: var(–accent); }
.toggle::after {
content: ‘’;
position: absolute;
top: 2px; left: 2px;
width: 14px; height: 14px;
border-radius: 50%;
background: var(–muted);
transition: transform 0.2s, background 0.2s;
}
.toggle.on::after { transform: translateX(16px); background: var(–accent); box-shadow: 0 0 6px var(–accent); }

/* ── TOGGLE BUTTON ── */
#toggle-btn {
position: fixed;
top: 16px; right: 16px;
z-index: 200;
width: 40px; height: 40px;
background: rgba(10,13,20,0.85);
border: 1px solid var(–border);
border-radius: 8px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 5px;
backdrop-filter: blur(12px);
transition: border-color 0.2s, background 0.2s;
}
#toggle-btn:hover { border-color: var(–accent); background: rgba(0,229,255,0.08); }
#toggle-btn span {
display: block;
width: 18px; height: 2px;
background: var(–text);
border-radius: 1px;
transition: all 0.25s;
}

/* FPS */
#fps {
position: fixed;
bottom: 14px; left: 14px;
font-family: ‘Space Mono’, monospace;
font-size: 10px;
color: var(–muted);
z-index: 50;
pointer-events: none;
letter-spacing: 0.05em;
}

/* preset select */
select {
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
padding: 6px 8px;
border-radius: 4px;
width: 100%;
cursor: pointer;
outline: none;
margin-bottom: 8px;
appearance: none;
}
select:focus { border-color: var(–accent); }

@media (max-width: 600px) {
:root { –panel-w: 100vw; }
#panel { border-left: none; border-top: 1px solid var(–border); top: auto; bottom: 0; height: 65vh; width: 100%; }
#panel.hidden { transform: translateY(100%); }
#toggle-btn { top: auto; bottom: 16px; right: 16px; }
}
</style>

</head>

<script>
// ─────────────────────────────────────────────
//  FLUID SIMULATION  –  WebGL2 / WebGL1 fallback
//  Navier-Stokes incompressible fluid with:
//  advection, diffusion, pressure solve,
//  vorticity confinement, bloom, sunrays, shading
// ─────────────────────────────────────────────

'use strict';

const canvas = document.getElementById('c');

// ── CONFIG ──────────────────────────────────
let CFG = {
  SIM_RESOLUTION: 256,
  DYE_RESOLUTION: 1024,
  DENSITY_DISSIPATION: 0.98,
  VELOCITY_DISSIPATION: 0.99,
  PRESSURE_ITERATIONS: 20,
  CURL: 10,
  SPLAT_RADIUS: 0.25,
  SPLAT_FORCE: 6000,
  SHADING: true,
  COLORFUL: true,
  COLOR_UPDATE_SPEED: 10,
  PAUSED: false,
  BACK_COLOR: { r: 0, g: 0, b: 0 },
  TRANSPARENT: false,
  BLOOM: true,
  BLOOM_ITERATIONS: 8,
  BLOOM_RESOLUTION: 256,
  BLOOM_INTENSITY: 0.8,
  BLOOM_THRESHOLD: 0.6,
  BLOOM_SOFT_KNEE: 0.7,
  SUNRAYS: true,
  SUNRAYS_RESOLUTION: 196,
  SUNRAYS_WEIGHT: 1.0,
  VISCOSITY: 0.0005,
  AUTO_SPLAT: true,
  AUTO_RATE: 1.0,
  AUTO_COUNT: 3,
  COLOR_MODE: 'rainbow',
  CUSTOM_COLOR: { r: 0, g: 0.9, b: 1 },
};

// ── PRESETS ──────────────────────────────────
const PRESETS = {
  ink:       { BACK_COLOR:{r:0,g:0,b:0}, COLOR_MODE:'custom', CUSTOM_COLOR:{r:0.2,g:0.3,b:1}, CURL:5, DENSITY_DISSIPATION:0.97, SHADING:true, BLOOM:true, AUTO_COUNT:1, AUTO_RATE:0.3 },
  fire:      { BACK_COLOR:{r:0,g:0,b:0}, COLOR_MODE:'gradient', CURL:30, DENSITY_DISSIPATION:0.95, VELOCITY_DISSIPATION:0.96, BLOOM_THRESHOLD:0.3, SUNRAYS:true, AUTO_RATE:2.0, AUTO_COUNT:5 },
  electric:  { BACK_COLOR:{r:0,g:0,b:0}, COLOR_MODE:'rainbow', CURL:40, DENSITY_DISSIPATION:0.97, SPLAT_FORCE:10000, BLOOM:true, SUNRAYS:true, AUTO_COUNT:8, AUTO_RATE:1.5 },
  pastel:    { BACK_COLOR:{r:0.05,g:0.02,b:0.08}, COLOR_MODE:'rainbow', CURL:5, DENSITY_DISSIPATION:0.99, BLOOM_SOFT_KNEE:1.0, SHADING:false, AUTO_COUNT:3, AUTO_RATE:0.5 },
  neon:      { BACK_COLOR:{r:0,g:0,b:0}, COLOR_MODE:'rainbow', CURL:25, DENSITY_DISSIPATION:0.96, BLOOM:true, BLOOM_THRESHOLD:0.2, SUNRAYS:true, SUNRAYS_WEIGHT:0.8, AUTO_COUNT:6, AUTO_RATE:1.2 },
  oil:       { BACK_COLOR:{r:0.01,g:0.01,b:0.02}, COLOR_MODE:'rainbow', CURL:8, DENSITY_DISSIPATION:0.999, VELOCITY_DISSIPATION:0.999, BLOOM:true, SHADING:true, AUTO_COUNT:2, AUTO_RATE:0.4 },
};

// ── WebGL INIT ───────────────────────────────
function getWebGLContext(canvas) {
  const params = { alpha: true, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };
  let gl = canvas.getContext('webgl2', params);
  const isWebGL2 = !!gl;
  if (!isWebGL2) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);
  let halfFloat, supportLinearFiltering;
  if (isWebGL2) {
    gl.getExtension('EXT_color_buffer_float');
    supportLinearFiltering = gl.getExtension('OES_texture_float_linear');
  } else {
    halfFloat = gl.getExtension('OES_texture_half_float');
    supportLinearFiltering = gl.getExtension('OES_texture_half_float_linear');
  }
  gl.clearColor(0, 0, 0, 1);
  const halfFloatTexType = isWebGL2 ? gl.HALF_FLOAT : halfFloat && halfFloat.HALF_FLOAT_OES;
  let formatRGBA, formatRG, formatR;
  if (isWebGL2) {
    formatRGBA = getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, halfFloatTexType);
    formatRG   = getSupportedFormat(gl, gl.RG16F,   gl.RG,   halfFloatTexType);
    formatR    = getSupportedFormat(gl, gl.R16F,    gl.RED,  halfFloatTexType);
  } else {
    formatRGBA = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
    formatRG   = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
    formatR    = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
  }
  return { gl, ext: { formatRGBA, formatRG, formatR, halfFloatTexType, supportLinearFiltering, isWebGL2 }};
}

function getSupportedFormat(gl, internalFormat, format, type) {
  if (!supportRenderTextureFormat(gl, internalFormat, format, type)) {
    if (internalFormat === gl.R16F)    return getSupportedFormat(gl, gl.RG16F,   gl.RG,   type);
    if (internalFormat === gl.RG16F)   return getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, type);
    return null;
  }
  return { internalFormat, format };
}

function supportRenderTextureFormat(gl, internalFormat, format, type) {
  let texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
  let fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  return status === gl.FRAMEBUFFER_COMPLETE;
}

const { gl, ext } = getWebGLContext(canvas);

// ── SHADERS ──────────────────────────────────
const baseVertSrc = `
precision highp float;
attribute vec2 aPosition;
varying vec2 vUv;
varying vec2 vL;
varying vec2 vR;
varying vec2 vT;
varying vec2 vB;
uniform vec2 texelSize;
void main () {
  vUv = aPosition * 0.5 + 0.5;
  vL = vUv - vec2(texelSize.x, 0.0);
  vR = vUv + vec2(texelSize.x, 0.0);
  vT = vUv + vec2(0.0, texelSize.y);
  vB = vUv - vec2(0.0, texelSize.y);
  gl_Position = vec4(aPosition, 0.0, 1.0);
}`;

const copyFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vUv; uniform sampler2D uTexture;
void main () { gl_FragColor = texture2D(uTexture, vUv); }`;

const clearFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vUv; uniform sampler2D uTexture; uniform float value;
void main () { gl_FragColor = value * texture2D(uTexture, vUv); }`;

const colorFrag = `precision mediump float;
uniform vec4 color;
void main () { gl_FragColor = color; }`;

const checkerboardFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uTexture; uniform float aspectRatio;
#define SCALE 25.0
void main () {
  vec2 uv = floor(vUv * SCALE * vec2(aspectRatio, 1.0));
  float v = mod(uv.x + uv.y, 2.0);
  v = v * 0.1 + 0.8;
  gl_FragColor = vec4(vec3(v), 1.0);
}`;

const displayShadingFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
uniform sampler2D uTexture; uniform vec2 texelSize;
void main () {
  vec3 L = texture2D(uTexture, vL).rgb;
  vec3 R = texture2D(uTexture, vR).rgb;
  vec3 T = texture2D(uTexture, vT).rgb;
  vec3 B = texture2D(uTexture, vB).rgb;
  vec3 C = texture2D(uTexture, vUv).rgb;
  float dx = length(R) - length(L);
  float dy = length(T) - length(B);
  vec3 n = normalize(vec3(dx, dy, length(texelSize)));
  vec3 l = vec3(0.0, 0.0, 1.0);
  float diffuse = clamp(dot(n, l) + 0.7, 0.7, 1.0);
  C *= diffuse;
  float a = max(C.r, max(C.g, C.b));
  gl_FragColor = vec4(C, a);
}`;

const displayFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv;
uniform sampler2D uTexture;
void main () {
  vec3 C = texture2D(uTexture, vUv).rgb;
  float a = max(C.r, max(C.g, C.b));
  gl_FragColor = vec4(C, a);
}`;

const bloomPrefilterFrag = `precision mediump float; precision mediump sampler2D;
varying vec2 vUv; uniform sampler2D uTexture; uniform vec3 curve; uniform float threshold;
void main () {
  vec3 c = texture2D(uTexture, vUv).rgb;
  float br = max(c.r, max(c.g, c.b));
  float rq = clamp(br - curve.x, 0.0, curve.y);
  rq = curve.z * rq * rq;
  c *= max(rq, br - threshold) / max(br, 0.0001);
  gl_FragColor = vec4(c, 0.0);
}`;

const bloomBlurFrag = `precision mediump float; precision mediump sampler2D;
varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
uniform sampler2D uTexture;
void main () {
  vec4 sum = vec4(0.0);
  sum += texture2D(uTexture, vL);
  sum += texture2D(uTexture, vR);
  sum += texture2D(uTexture, vT);
  sum += texture2D(uTexture, vB);
  sum *= 0.25;
  gl_FragColor = sum;
}`;

const bloomFinalFrag = `precision mediump float; precision mediump sampler2D;
varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
uniform sampler2D uTexture; uniform float intensity;
void main () {
  vec4 sum = vec4(0.0);
  sum += texture2D(uTexture, vL);
  sum += texture2D(uTexture, vR);
  sum += texture2D(uTexture, vT);
  sum += texture2D(uTexture, vB);
  sum *= 0.25;
  gl_FragColor = sum * intensity;
}`;

const sunraysMaskFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uTexture;
void main () {
  vec4 c = texture2D(uTexture, vUv);
  float br = max(c.r, max(c.g, c.b));
  c.a = 1.0 - min(max(br * 20.0, 0.0), 0.8);
  gl_FragColor = c;
}`;

const sunraysFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uTexture; uniform float weight;
#define ITERATIONS 16
void main () {
  float Density = 0.3; float Decay = 0.95; float Exposure = 0.7;
  vec2 coord = vUv;
  vec2 dir = vUv - 0.5;
  dir *= 1.0 / float(ITERATIONS) * Density;
  float illuminationDecay = 1.0;
  vec4 color = vec4(0.0);
  for (int i = 0; i < ITERATIONS; i++) {
    coord -= dir;
    vec4 sample = texture2D(uTexture, coord);
    sample *= illuminationDecay * Exposure;
    color += sample;
    illuminationDecay *= Decay;
  }
  gl_FragColor = color * weight;
}`;

const splatFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uTarget; uniform float aspectRatio;
uniform vec3 color; uniform vec2 point; uniform float radius;
void main () {
  vec2 p = vUv - point.xy;
  p.x *= aspectRatio;
  vec3 splat = exp(-dot(p, p) / radius) * color;
  vec3 base = texture2D(uTarget, vUv).xyz;
  gl_FragColor = vec4(base + splat, 1.0);
}`;

const advectionFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uVelocity; uniform sampler2D uSource;
uniform vec2 texelSize; uniform vec2 dyeTexelSize; uniform float dt; uniform float dissipation;
vec4 bilerp (sampler2D sam, vec2 uv, vec2 tsize) {
  vec2 st = uv / tsize - 0.5;
  vec2 iuv = floor(st); vec2 fuv = fract(st);
  vec4 a = texture2D(sam, (iuv + vec2(0.5, 0.5)) * tsize);
  vec4 b = texture2D(sam, (iuv + vec2(1.5, 0.5)) * tsize);
  vec4 c = texture2D(sam, (iuv + vec2(0.5, 1.5)) * tsize);
  vec4 d = texture2D(sam, (iuv + vec2(1.5, 1.5)) * tsize);
  return mix(mix(a, b, fuv.x), mix(c, d, fuv.x), fuv.y);
}
void main () {
  vec2 coord = vUv - dt * bilerp(uVelocity, vUv, texelSize).xy * texelSize;
  vec4 result = bilerp(uSource, coord, dyeTexelSize);
  float decay = 1.0 + dissipation * dt;
  gl_FragColor = result / decay;
}`;

const advectionManualFilteringFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; uniform sampler2D uVelocity; uniform sampler2D uSource;
uniform vec2 texelSize; uniform vec2 dyeTexelSize; uniform float dt; uniform float dissipation;
vec4 bilerp (sampler2D sam, vec2 uv, vec2 tsize) {
  vec2 st = uv / tsize - 0.5;
  vec2 iuv = floor(st); vec2 fuv = fract(st);
  vec4 a = texture2D(sam, (iuv + vec2(0.5, 0.5)) * tsize);
  vec4 b = texture2D(sam, (iuv + vec2(1.5, 0.5)) * tsize);
  vec4 c = texture2D(sam, (iuv + vec2(0.5, 1.5)) * tsize);
  vec4 d = texture2D(sam, (iuv + vec2(1.5, 1.5)) * tsize);
  return mix(mix(a, b, fuv.x), mix(c, d, fuv.x), fuv.y);
}
void main () {
  vec2 coord = vUv - dt * bilerp(uVelocity, vUv, texelSize).xy * texelSize;
  vec4 result = bilerp(uSource, coord, dyeTexelSize);
  float decay = 1.0 + dissipation * dt;
  gl_FragColor = result / decay;
}`;

const divergenceFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vL; varying highp vec2 vR; varying highp vec2 vT; varying highp vec2 vB;
uniform sampler2D uVelocity;
void main () {
  float L = texture2D(uVelocity, vL).x;
  float R = texture2D(uVelocity, vR).x;
  float T = texture2D(uVelocity, vT).y;
  float B = texture2D(uVelocity, vB).y;
  vec2 C = texture2D(uVelocity, (vL+vR)*0.5).xy;
  if (vL.x < 0.0) { L = -C.x; }
  if (vR.x > 1.0) { R = -C.x; }
  if (vT.y > 1.0) { T = -C.y; }
  if (vB.y < 0.0) { B = -C.y; }
  float div = 0.5 * (R - L + T - B);
  gl_FragColor = vec4(div, 0.0, 0.0, 1.0);
}`;

const curlFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vL; varying highp vec2 vR; varying highp vec2 vT; varying highp vec2 vB;
uniform sampler2D uVelocity;
void main () {
  float L = texture2D(uVelocity, vL).y;
  float R = texture2D(uVelocity, vR).y;
  float T = texture2D(uVelocity, vT).x;
  float B = texture2D(uVelocity, vB).x;
  float vorticity = R - L - T + B;
  gl_FragColor = vec4(0.5 * vorticity, 0.0, 0.0, 1.0);
}`;

const vorticityFrag = `precision highp float; precision highp sampler2D;
varying vec2 vUv; varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
uniform sampler2D uVelocity; uniform sampler2D uCurl; uniform float curl; uniform float dt;
void main () {
  float L = texture2D(uCurl, vL).x;
  float R = texture2D(uCurl, vR).x;
  float T = texture2D(uCurl, vT).x;
  float B = texture2D(uCurl, vB).x;
  float C = texture2D(uCurl, vUv).x;
  vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
  force /= length(force) + 0.0001;
  force *= curl * C;
  force.y *= -1.0;
  vec2 vel = texture2D(uVelocity, vUv).xy;
  gl_FragColor = vec4(vel + force * dt, 0.0, 1.0);
}`;

const pressureFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vUv; varying highp vec2 vL; varying highp vec2 vR; varying highp vec2 vT; varying highp vec2 vB;
uniform sampler2D uPressure; uniform sampler2D uDivergence;
void main () {
  float L = texture2D(uPressure, vL).x;
  float R = texture2D(uPressure, vR).x;
  float T = texture2D(uPressure, vT).x;
  float B = texture2D(uPressure, vB).x;
  float C = texture2D(uPressure, vUv).x;
  float divergence = texture2D(uDivergence, vUv).x;
  float pressure = (L + R + B + T - divergence) * 0.25;
  gl_FragColor = vec4(pressure, 0.0, 0.0, 1.0);
}`;

const gradientSubtractFrag = `precision mediump float; precision mediump sampler2D;
varying highp vec2 vUv; varying highp vec2 vL; varying highp vec2 vR; varying highp vec2 vT; varying highp vec2 vB;
uniform sampler2D uPressure; uniform sampler2D uVelocity;
void main () {
  float L = texture2D(uPressure, vL).x;
  float R = texture2D(uPressure, vR).x;
  float T = texture2D(uPressure, vT).x;
  float B = texture2D(uPressure, vB).x;
  vec2 velocity = texture2D(uVelocity, vUv).xy;
  velocity.xy -= vec2(R - L, T - B);
  gl_FragColor = vec4(velocity, 0.0, 1.0);
}`;

// ── SHADER PROGRAM ───────────────────────────
function compileShader(type, source, keywords) {
  source = addKeywords(source, keywords);
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(shader));
  return shader;
}

function addKeywords(source, keywords) {
  if (!keywords) return source;
  let keywordsString = '';
  keywords.forEach(k => { keywordsString += '#define ' + k + '\n'; });
  return keywordsString + source;
}

class Material {
  constructor(vertexShader, fragmentShaderSource) {
    this.vertexShader = vertexShader;
    this.fragmentShaderSource = fragmentShaderSource;
    this.programs = [];
    this.activeProgram = null;
    this.uniforms = [];
  }
  setKeywords(keywords) {
    let hash = 0;
    for (let i = 0; i < keywords.length; i++) hash += hashCode(keywords[i]);
    let program = this.programs[hash];
    if (!program) {
      let fragmentShader = compileShader(gl.FRAGMENT_SHADER, this.fragmentShaderSource, keywords);
      program = createProgram(this.vertexShader, fragmentShader);
      this.programs[hash] = program;
    }
    if (program === this.activeProgram) return;
    this.uniforms = getUniforms(program);
    this.activeProgram = program;
  }
  bind() { gl.useProgram(this.activeProgram); }
}

class Program {
  constructor(vertexShader, fragmentShader) {
    this.uniforms = {};
    this.program = createProgram(vertexShader, fragmentShader);
    this.uniforms = getUniforms(this.program);
  }
  bind() { gl.useProgram(this.program); }
}

function createProgram(vertexShader, fragmentShader) {
  let program = gl.createProgram();
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(program));
  return program;
}

function getUniforms(program) {
  let uniforms = [];
  let uniformCount = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < uniformCount; i++) {
    let uniformName = gl.getActiveUniform(program, i).name;
    uniforms[uniformName] = gl.getUniformLocation(program, uniformName);
  }
  return uniforms;
}

function hashCode(s) {
  if (s.length === 0) return 0;
  let hash = 0;
  for (let i = 0; i < s.length; i++) {
    hash = (hash << 5) - hash + s.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}

// ── COMPILE BASE SHADERS ─────────────────────
const baseVert    = compileShader(gl.VERTEX_SHADER, baseVertSrc);
const copyProg    = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, copyFrag));
const clearProg   = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, clearFrag));
const splatProg   = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, splatFrag));
const advProg     = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, ext.supportLinearFiltering ? advectionFrag : advectionManualFilteringFrag));
const divProg     = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, divergenceFrag));
const curlProg    = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, curlFrag));
const vortProg    = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, vorticityFrag));
const presProg    = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, pressureFrag));
const gradProg    = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, gradientSubtractFrag));
const bBlurProg   = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, bloomBlurFrag));
const bFinalProg  = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, bloomFinalFrag));
const bPrefilterProg = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, bloomPrefilterFrag));
const sunraysMaskProg = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, sunraysMaskFrag));
const sunraysProg = new Program(baseVert, compileShader(gl.FRAGMENT_SHADER, sunraysFrag));

const displayMaterial = new Material(baseVert, `precision highp float; precision highp sampler2D;
varying vec2 vUv; varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
uniform sampler2D uTexture; uniform sampler2D uBloom; uniform sampler2D uSunrays;
uniform sampler2D uDithering; uniform vec2 ditherScale; uniform vec2 texelSize;
vec3 linearToGamma (vec3 color) { color = max(color, vec3(0)); return max(1.055 * pow(color, vec3(0.4166666667)) - 0.055, vec3(0)); }
void main () {
  vec3 c = texture2D(uTexture, vUv).rgb;
  #ifdef SHADING
    vec3 lc = texture2D(uTexture, vL).rgb;
    vec3 rc = texture2D(uTexture, vR).rgb;
    vec3 tc = texture2D(uTexture, vT).rgb;
    vec3 bc = texture2D(uTexture, vB).rgb;
    float dx = length(rc) - length(lc);
    float dy = length(tc) - length(bc);
    vec3 n = normalize(vec3(dx, dy, length(texelSize)));
    vec3 l = vec3(0.0, 0.0, 1.0);
    float diffuse = clamp(dot(n, l) + 0.7, 0.7, 1.0);
    c *= diffuse;
  #endif
  #ifdef BLOOM
    vec3 bloom = texture2D(uBloom, vUv).rgb;
  #endif
  #ifdef SUNRAYS
    float sunrays = texture2D(uSunrays, vUv).r;
    c *= sunrays;
    #ifdef BLOOM
      bloom *= sunrays;
    #endif
  #endif
  #ifdef BLOOM
    float noise = texture2D(uDithering, vUv * ditherScale).r;
    noise = noise * 2.0 - 1.0;
    bloom += noise / 255.0;
    bloom = linearToGamma(bloom);
    c += bloom;
  #endif
  float a = max(c.r, max(c.g, c.b));
  gl_FragColor = vec4(c, a);
}`);

// ── FRAMEBUFFER UTILITIES ────────────────────
function createFBO(w, h, internalFormat, format, type, param) {
  gl.activeTexture(gl.TEXTURE0);
  let texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, param);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, param);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);
  let fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  gl.viewport(0, 0, w, h);
  gl.clear(gl.COLOR_BUFFER_BIT);
  let texelSizeX = 1.0 / w;
  let texelSizeY = 1.0 / h;
  return { texture, fbo, width: w, height: h,
    texelSizeX, texelSizeY,
    attach(id) { gl.activeTexture(gl.TEXTURE0 + id); gl.bindTexture(gl.TEXTURE_2D, texture); return id; }
  };
}

function createDoubleFBO(w, h, internalFormat, format, type, param) {
  let fbo1 = createFBO(w, h, internalFormat, format, type, param);
  let fbo2 = createFBO(w, h, internalFormat, format, type, param);
  return {
    width: w, height: h, texelSizeX: fbo1.texelSizeX, texelSizeY: fbo1.texelSizeY,
    get read() { return fbo1; },
    set read(v) { fbo1 = v; },
    get write() { return fbo2; },
    set write(v) { fbo2 = v; },
    swap() { let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp; }
  };
}

function resizeFBO(target, w, h, internalFormat, format, type, param) {
  let newFBO = createFBO(w, h, internalFormat, format, type, param);
  copyProg.bind();
  gl.uniform1i(copyProg.uniforms.uTexture, target.attach(0));
  blit(newFBO);
  return newFBO;
}

function resizeDoubleFBO(target, w, h, internalFormat, format, type, param) {
  if (target.width === w && target.height === h) return target;
  target.read = resizeFBO(target.read, w, h, internalFormat, format, type, param);
  target.write = createFBO(w, h, internalFormat, format, type, param);
  target.width = w; target.height = h;
  target.texelSizeX = 1.0 / w; target.texelSizeY = 1.0 / h;
  return target;
}

// ── BLIT ─────────────────────────────────────
const quadBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), gl.STATIC_DRAW);
const quadIndexBuffer = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadIndexBuffer);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), gl.STATIC_DRAW);

function blit(target, clear = false) {
  if (!target) {
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  } else {
    gl.viewport(0, 0, target.width, target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
  }
  if (clear) { gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT); }
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadIndexBuffer);
  gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
}

// ── TEXTURE BUFFERS ──────────────────────────
let dye, velocity, divergence, curl, pressure, bloom, bloomFramebuffers = [], sunrays, sunraysTemp;

const texType = ext.halfFloatTexType;
const rgba    = ext.formatRGBA;
const rg      = ext.formatRG;
const r       = ext.formatR;
const filtering = ext.supportLinearFiltering ? gl.LINEAR : gl.NEAREST;

function initFramebuffers() {
  let simRes = getResolution(CFG.SIM_RESOLUTION);
  let dyeRes = getResolution(CFG.DYE_RESOLUTION);
  if (!dye) {
    dye      = createDoubleFBO(dyeRes.width, dyeRes.height, rgba.internalFormat, rgba.format, texType, filtering);
    velocity = createDoubleFBO(simRes.width, simRes.height, rg.internalFormat, rg.format, texType, filtering);
    divergence = createFBO(simRes.width, simRes.height, r.internalFormat, r.format, texType, gl.NEAREST);
    curl       = createFBO(simRes.width, simRes.height, r.internalFormat, r.format, texType, gl.NEAREST);
    pressure   = createDoubleFBO(simRes.width, simRes.height, r.internalFormat, r.format, texType, gl.NEAREST);
  } else {
    dye      = resizeDoubleFBO(dye, dyeRes.width, dyeRes.height, rgba.internalFormat, rgba.format, texType, filtering);
    velocity = resizeDoubleFBO(velocity, simRes.width, simRes.height, rg.internalFormat, rg.format, texType, filtering);
  }
  initBloomFramebuffers();
  initSunraysFramebuffers();
}

function initBloomFramebuffers() {
  let res = getResolution(CFG.BLOOM_RESOLUTION);
  bloom = createFBO(res.width, res.height, rgba.internalFormat, rgba.format, texType, filtering);
  bloomFramebuffers.length = 0;
  for (let i = 0; i < CFG.BLOOM_ITERATIONS; i++) {
    let w = res.width >> (i + 1);
    let h = res.height >> (i + 1);
    if (w < 2 || h < 2) break;
    bloomFramebuffers.push(createFBO(w, h, rgba.internalFormat, rgba.format, texType, filtering));
  }
}

function initSunraysFramebuffers() {
  let res = getResolution(CFG.SUNRAYS_RESOLUTION);
  sunrays     = createFBO(res.width, res.height, r.internalFormat, r.format, texType, filtering);
  sunraysTemp = createFBO(res.width, res.height, r.internalFormat, r.format, texType, filtering);
}

function getResolution(resolution) {
  let aspectRatio = gl.drawingBufferWidth / gl.drawingBufferHeight;
  if (aspectRatio < 1) aspectRatio = 1.0 / aspectRatio;
  let min = Math.round(resolution);
  let max = Math.round(resolution * aspectRatio);
  if (gl.drawingBufferWidth > gl.drawingBufferHeight)
    return { width: max, height: min };
  else
    return { width: min, height: max };
}

// ── DITHER TEXTURE ───────────────────────────
const ditheringTexture = createTextureAsync();
function createTextureAsync() {
  let texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  // Generate procedural blue noise
  const size = 64;
  const data = new Uint8Array(size * size * 4);
  for (let i = 0; i < size * size; i++) {
    const n = Math.random() * 255;
    data[i*4] = data[i*4+1] = data[i*4+2] = n;
    data[i*4+3] = 255;
  }
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
  return { texture, width: size, height: size,
    attach(id) { gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, texture); return id; }
  };
}

// ── RESIZE ───────────────────────────────────
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth;
  const cssH = canvas.clientHeight;
  const w = Math.round(cssW * dpr);
  const h = Math.round(cssH * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    initFramebuffers();
  }
}

// ── COLOR HELPERS ────────────────────────────
function HSVtoRGB(h, s, v) {
  let r, g, b, i = Math.floor(h * 6), f = h * 6 - i, p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
  switch (i % 6) {
    case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break; case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break; case 5: r=v; g=p; b=q; break;
  }
  return { r, g, b };
}

function normalizeColor(input) {
  return { r: input.r / 255, g: input.g / 255, b: input.b / 255 };
}

let colorPhase = 0;
function generateColor() {
  colorPhase += CFG.COLOR_UPDATE_SPEED * 0.01;
  if (CFG.COLOR_MODE === 'rainbow') {
    return HSVtoRGB(colorPhase % 1, 1, 1);
  } else if (CFG.COLOR_MODE === 'custom') {
    let jitter = () => (Math.random() - 0.5) * 0.2;
    return {
      r: Math.max(0, Math.min(1, CFG.CUSTOM_COLOR.r + jitter())),
      g: Math.max(0, Math.min(1, CFG.CUSTOM_COLOR.g + jitter())),
      b: Math.max(0, Math.min(1, CFG.CUSTOM_COLOR.b + jitter()))
    };
  } else if (CFG.COLOR_MODE === 'gradient') {
    const t = (Math.sin(colorPhase * 3.14) + 1) * 0.5;
    return { r: t, g: 0.3 * (1-t), b: 1 - t };
  } else { // monochrome
    let v = 0.5 + 0.5 * Math.sin(colorPhase);
    return { r: v, g: v, b: v };
  }
}

// clientX/Y are in CSS pixels. canvas.width/height are in physical pixels.
// So we must scale client coords up to match the canvas physical dimensions.
function clientToCanvas(clientVal, canvasDim, cssCanvasDim) {
  return clientVal * (canvasDim / cssCanvasDim);
}

// splat takes normalized UV coords (0–1) and normalized deltas
function splat(x, y, dx, dy, color) {
  splatProg.bind();
  gl.uniform1i(splatProg.uniforms.uTarget, velocity.read.attach(0));
  gl.uniform1f(splatProg.uniforms.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(splatProg.uniforms.point, x, y);
  gl.uniform3f(splatProg.uniforms.color, dx, dy, 0);
  gl.uniform1f(splatProg.uniforms.radius, correctRadius(CFG.SPLAT_RADIUS));
  blit(velocity.write);
  velocity.swap();

  gl.uniform1i(splatProg.uniforms.uTarget, dye.read.attach(0));
  gl.uniform3f(splatProg.uniforms.color, color.r, color.g, color.b);
  blit(dye.write);
  dye.swap();
}

function correctRadius(radius) {
  let aspectRatio = canvas.width / canvas.height;
  if (aspectRatio > 1) radius *= aspectRatio;
  return radius;
}

function multipleSplats(amount) {
  for (let i = 0; i < amount; i++) {
    const color = generateColor();
    color.r *= 10; color.g *= 10; color.b *= 10;
    const x = Math.random();
    const y = Math.random();
    const dx = 1000 * (Math.random() - 0.5);
    const dy = 1000 * (Math.random() - 0.5);
    splat(x, y, dx, dy, color);
  }
}

// ── POINTER ──────────────────────────────────
class Pointer {
  constructor() {
    this.id = -1; this.texcoordX = 0; this.texcoordY = 0;
    this.prevTexcoordX = 0; this.prevTexcoordY = 0;
    this.deltaX = 0; this.deltaY = 0;
    this.down = false; this.moved = false;
    this.color = { r: 1, g: 0, b: 0 };
  }
}

let pointers = [new Pointer()];

function updatePointerDownData(pointer, id, posX, posY) {
  pointer.id = id;
  pointer.down = true;
  pointer.moved = false;
  pointer.texcoordX = posX / canvas.width;
  pointer.texcoordY = 1.0 - posY / canvas.height;
  pointer.prevTexcoordX = pointer.texcoordX;
  pointer.prevTexcoordY = pointer.texcoordY;
  pointer.deltaX = 0; pointer.deltaY = 0;
  pointer.color = generateColor();
  pointer.color.r *= 10; pointer.color.g *= 10; pointer.color.b *= 10;
}

function updatePointerMoveData(pointer, posX, posY, color) {
  pointer.prevTexcoordX = pointer.texcoordX;
  pointer.prevTexcoordY = pointer.texcoordY;
  pointer.texcoordX = posX / canvas.width;
  pointer.texcoordY = 1.0 - posY / canvas.height;
  // Deltas in UV space — corrected for aspect ratio so fluid moves in screen direction
  pointer.deltaX = correctDeltaX(pointer.texcoordX - pointer.prevTexcoordX);
  pointer.deltaY = correctDeltaY(pointer.texcoordY - pointer.prevTexcoordY);
  pointer.moved = Math.abs(pointer.deltaX) > 0 || Math.abs(pointer.deltaY) > 0;
  if (color) pointer.color = color;
}

function correctDeltaX(delta) {
  let aspectRatio = canvas.width / canvas.height;
  if (aspectRatio < 1) delta *= aspectRatio;
  return delta;
}
function correctDeltaY(delta) {
  let aspectRatio = canvas.width / canvas.height;
  if (aspectRatio > 1) delta /= aspectRatio;
  return delta;
}

function updatePointerUpData(pointer) { pointer.down = false; }

// ── INPUT EVENTS ──────────────────────────────
// Maps a CSS-pixel position inside the canvas rect to physical canvas coords
function canvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

canvas.addEventListener('mousedown', e => {
  const pos = canvasPos(e.clientX, e.clientY);
  updatePointerDownData(pointers[0], -1, pos.x, pos.y);
});

canvas.addEventListener('mousemove', e => {
  if (!pointers[0].down) return;
  const pos = canvasPos(e.clientX, e.clientY);
  updatePointerMoveData(pointers[0], pos.x, pos.y);
});

window.addEventListener('mouseup', () => updatePointerUpData(pointers[0]));

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    // find or create a pointer slot for this touch id
    let slot = pointers.find(p => p.id === touches[i].identifier);
    if (!slot) {
      slot = new Pointer();
      pointers.push(slot);
    }
    const pos = canvasPos(touches[i].clientX, touches[i].clientY);
    updatePointerDownData(slot, touches[i].identifier, pos.x, pos.y);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const slot = pointers.find(p => p.id === touches[i].identifier);
    if (!slot || !slot.down) continue;
    const pos = canvasPos(touches[i].clientX, touches[i].clientY);
    updatePointerMoveData(slot, pos.x, pos.y);
  }
}, { passive: false });

window.addEventListener('touchend', e => {
  const touches = e.changedTouches;
  for (let i = 0; i < touches.length; i++) {
    const slot = pointers.find(p => p.id === touches[i].identifier);
    if (slot) updatePointerUpData(slot);
  }
});

// ── SHAKE DETECTION ──────────────────────────
let lastAcc = { x: 0, y: 0, z: 0 };
let lastShakeTime = 0;
let shakeBuffer = [];

function triggerShake() {
  const now = Date.now();
  if (now - lastShakeTime < 800) return; // debounce
  lastShakeTime = now;

  // Big burst of splats + reverse/scramble velocity
  const count = 20 + Math.floor(Math.random() * 15);
  multipleSplats(count);

  // Scramble velocity field by splatting invisible force bursts
  for (let i = 0; i < 8; i++) {
    const x = Math.random();
    const y = Math.random();
    const angle = Math.random() * Math.PI * 2;
    const force = CFG.SPLAT_FORCE * 3;
    splatProg.bind();
    gl.uniform1i(splatProg.uniforms.uTarget, velocity.read.attach(0));
    gl.uniform1f(splatProg.uniforms.aspectRatio, canvas.width / canvas.height);
    gl.uniform2f(splatProg.uniforms.point, x, y);
    gl.uniform3f(splatProg.uniforms.color,
      Math.cos(angle) * force,
      Math.sin(angle) * force,
      0);
    gl.uniform1f(splatProg.uniforms.radius, correctRadius(CFG.SPLAT_RADIUS * 3));
    blit(velocity.write);
    velocity.swap();
  }

  // Flash notification
  showShakeFlash();
}

function showShakeFlash() {
  let flash = document.getElementById('shake-flash');
  if (!flash) {
    flash = document.createElement('div');
    flash.id = 'shake-flash';
    flash.style.cssText = `
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(255,255,255,0.08);
      pointer-events:none;z-index:9999;
      animation:shakeFlash 0.4s ease-out forwards;
    `;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
  }
}

// Inject shake flash keyframes
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shakeFlash {
    0%   { opacity:1; }
    100% { opacity:0; }
  }
  #shake-label {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-family:'Space Mono',monospace;
    font-size:13px; letter-spacing:0.15em;
    color:rgba(255,255,255,0.7);
    text-transform:uppercase;
    pointer-events:none;
    animation:shakeLabelAnim 1s ease-out forwards;
    z-index:10000;
  }
  @keyframes shakeLabelAnim {
    0%   { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
  }
`;
document.head.appendChild(shakeStyle);

function requestMotionPermission() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    // iOS 13+ requires explicit permission
    DeviceMotionEvent.requestPermission()
      .then(state => { if (state === 'granted') attachMotion(); })
      .catch(() => {});
  } else {
    attachMotion();
  }
}

function attachMotion() {
  window.addEventListener('devicemotion', e => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    const dx = Math.abs((acc.x || 0) - lastAcc.x);
    const dy = Math.abs((acc.y || 0) - lastAcc.y);
    const dz = Math.abs((acc.z || 0) - lastAcc.z);
    lastAcc = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
    const delta = dx + dy + dz;
    shakeBuffer.push(delta);
    if (shakeBuffer.length > 6) shakeBuffer.shift();
    const peak = Math.max(...shakeBuffer);
    if (peak > 35) triggerShake();
  });
}

// Trigger permission request on first touch (iOS requires user gesture)
let motionAttached = false;
window.addEventListener('touchstart', () => {
  if (!motionAttached) {
    motionAttached = true;
    requestMotionPermission();
  }
}, { once: true });

// Also attach on desktop (no-op if no accelerometer)
requestMotionPermission();

// ── SIMULATION STEP ──────────────────────────
let lastUpdateTime = Date.now();
let colorUpdateTimer = 0;
let autoSplatTimer = 0;
let fpsCounter = 0; let fpsTime = 0; let fps = 0;
const fpsEl = document.getElementById('fps');

function update() {
  const dt = calcDeltaTime();
  if (resizeCanvas()) initFramebuffers();
  updateColors(dt);
  applyInputs();
  if (!CFG.PAUSED) step(dt);
  render(null);
  updateFPS(dt);
  requestAnimationFrame(update);
}

function calcDeltaTime() {
  let now = Date.now();
  let dt = (now - lastUpdateTime) / 1000;
  dt = Math.min(dt, 0.016666);
  lastUpdateTime = now;
  return dt;
}

function updateFPS(dt) {
  fpsTime += dt; fpsCounter++;
  if (fpsTime >= 0.5) {
    fps = Math.round(fpsCounter / fpsTime);
    fpsEl.textContent = fps + ' fps';
    fpsTime = 0; fpsCounter = 0;
  }
}

function updateColors(dt) {
  colorUpdateTimer += dt * CFG.COLOR_UPDATE_SPEED;
  if (colorUpdateTimer >= 1) {
    colorUpdateTimer = 0;
    pointers.forEach(p => { p.color = generateColor(); p.color.r *= 10; p.color.g *= 10; p.color.b *= 10; });
  }
}

function applyInputs() {
  pointers.forEach(p => {
    if (p.moved) {
      p.moved = false;
      // texcoordX/Y are 0–1 (Y already flipped). deltaX/Y are normalized differences.
      splat(p.texcoordX, p.texcoordY,
            p.deltaX * CFG.SPLAT_FORCE, p.deltaY * CFG.SPLAT_FORCE, p.color);
    }
  });
}

function step(dt) {
  gl.disable(gl.BLEND);

  curlProg.bind();
  gl.uniform2f(curlProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(curlProg.uniforms.uVelocity, velocity.read.attach(0));
  blit(curl);

  vortProg.bind();
  gl.uniform2f(vortProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(vortProg.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(vortProg.uniforms.uCurl, curl.attach(1));
  gl.uniform1f(vortProg.uniforms.curl, CFG.CURL);
  gl.uniform1f(vortProg.uniforms.dt, dt);
  blit(velocity.write);
  velocity.swap();

  divProg.bind();
  gl.uniform2f(divProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(divProg.uniforms.uVelocity, velocity.read.attach(0));
  blit(divergence);

  clearProg.bind();
  gl.uniform1i(clearProg.uniforms.uTexture, pressure.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value, 0.8);
  blit(pressure.write);
  pressure.swap();

  presProg.bind();
  gl.uniform2f(presProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(presProg.uniforms.uDivergence, divergence.attach(0));
  for (let i = 0; i < CFG.PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(presProg.uniforms.uPressure, pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  gradProg.bind();
  gl.uniform2f(gradProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(gradProg.uniforms.uPressure, pressure.read.attach(0));
  gl.uniform1i(gradProg.uniforms.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  advProg.bind();
  gl.uniform2f(advProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  if (!ext.supportLinearFiltering)
    gl.uniform2f(advProg.uniforms.dyeTexelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(advProg.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advProg.uniforms.uSource, velocity.read.attach(0));
  gl.uniform1f(advProg.uniforms.dt, dt);
  gl.uniform1f(advProg.uniforms.dissipation, CFG.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  if (!ext.supportLinearFiltering)
    gl.uniform2f(advProg.uniforms.dyeTexelSize, dye.texelSizeX, dye.texelSizeY);
  gl.uniform1i(advProg.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advProg.uniforms.uSource, dye.read.attach(1));
  gl.uniform1f(advProg.uniforms.dissipation, CFG.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();

  // auto splat
  if (CFG.AUTO_SPLAT) {
    autoSplatTimer += dt;
    if (autoSplatTimer > 1.0 / CFG.AUTO_RATE) {
      autoSplatTimer = 0;
      multipleSplats(CFG.AUTO_COUNT);
    }
  }
}

function render(target) {
  if (CFG.BLOOM) applyBloom(dye.read, bloom);
  if (CFG.SUNRAYS) { applySunrays(dye.read, dye.write, sunrays); blurSunrays(sunrays, sunraysTemp, 1); }

  if (CFG.TRANSPARENT) {
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.enable(gl.BLEND);
  } else {
    gl.disable(gl.BLEND);
  }

  let bc = CFG.BACK_COLOR;
  if (!CFG.TRANSPARENT) drawColor(target, normalizeColor(bc));
  drawDisplay(target);
}

function drawColor(target, color) {
  // fill background — skip if transparent
}

function drawDisplay(target) {
  let w = target ? target.width : gl.drawingBufferWidth;
  let h = target ? target.height : gl.drawingBufferHeight;
  let keywords = [];
  if (CFG.SHADING) keywords.push('SHADING');
  if (CFG.BLOOM && bloom) keywords.push('BLOOM');
  if (CFG.SUNRAYS && sunrays) keywords.push('SUNRAYS');
  displayMaterial.setKeywords(keywords);
  displayMaterial.bind();
  if (CFG.SHADING)
    gl.uniform2f(displayMaterial.uniforms.texelSize, 1.0 / w, 1.0 / h);
  gl.uniform1i(displayMaterial.uniforms.uTexture, dye.read.attach(0));
  if (CFG.BLOOM) {
    gl.uniform1i(displayMaterial.uniforms.uBloom, bloom.attach(1));
    gl.uniform1i(displayMaterial.uniforms.uDithering, ditheringTexture.attach(2));
    let scale = [w / ditheringTexture.width, h / ditheringTexture.height];
    gl.uniform2f(displayMaterial.uniforms.ditherScale, scale[0], scale[1]);
  }
  if (CFG.SUNRAYS) gl.uniform1i(displayMaterial.uniforms.uSunrays, sunrays.attach(3));
  blit(target);
}

function applyBloom(source, destination) {
  if (bloomFramebuffers.length < 2) return;
  let last = destination;
  gl.disable(gl.BLEND);
  bPrefilterProg.bind();
  let knee = CFG.BLOOM_THRESHOLD * CFG.BLOOM_SOFT_KNEE + 0.0001;
  let curve0 = CFG.BLOOM_THRESHOLD - knee;
  let curve1 = knee * 2;
  let curve2 = 0.25 / knee;
  gl.uniform3f(bPrefilterProg.uniforms.curve, curve0, curve1, curve2);
  gl.uniform1f(bPrefilterProg.uniforms.threshold, CFG.BLOOM_THRESHOLD);
  gl.uniform1i(bPrefilterProg.uniforms.uTexture, source.attach(0));
  gl.viewport(0, 0, last.width, last.height);
  blit(last);

  bBlurProg.bind();
  for (let i = 0; i < bloomFramebuffers.length; i++) {
    let dest = bloomFramebuffers[i];
    gl.uniform2f(bBlurProg.uniforms.texelSize, last.texelSizeX, last.texelSizeY);
    gl.uniform1i(bBlurProg.uniforms.uTexture, last.attach(0));
    gl.viewport(0, 0, dest.width, dest.height);
    blit(dest);
    last = dest;
  }

  gl.blendFunc(gl.ONE, gl.ONE);
  gl.enable(gl.BLEND);
  for (let i = bloomFramebuffers.length - 2; i >= 0; i--) {
    let baseTex = bloomFramebuffers[i];
    gl.uniform2f(bBlurProg.uniforms.texelSize, last.texelSizeX, last.texelSizeY);
    gl.uniform1i(bBlurProg.uniforms.uTexture, last.attach(0));
    gl.viewport(0, 0, baseTex.width, baseTex.height);
    blit(baseTex);
    last = baseTex;
  }
  gl.disable(gl.BLEND);

  bFinalProg.bind();
  gl.uniform2f(bFinalProg.uniforms.texelSize, last.texelSizeX, last.texelSizeY);
  gl.uniform1i(bFinalProg.uniforms.uTexture, last.attach(0));
  gl.uniform1f(bFinalProg.uniforms.intensity, CFG.BLOOM_INTENSITY);
  gl.viewport(0, 0, destination.width, destination.height);
  blit(destination);
}

function applySunrays(source, mask, destination) {
  gl.disable(gl.BLEND);
  sunraysMaskProg.bind();
  gl.uniform1i(sunraysMaskProg.uniforms.uTexture, source.attach(0));
  blit(mask);
  sunraysProg.bind();
  gl.uniform1f(sunraysProg.uniforms.weight, CFG.SUNRAYS_WEIGHT);
  gl.uniform1i(sunraysProg.uniforms.uTexture, mask.attach(0));
  blit(destination);
}

function blurSunrays(target, temp, iterations) {
  bBlurProg.bind();
  for (let i = 0; i < iterations; i++) {
    gl.uniform2f(bBlurProg.uniforms.texelSize, target.texelSizeX, 0);
    gl.uniform1i(bBlurProg.uniforms.uTexture, target.attach(0));
    blit(temp);
    gl.uniform2f(bBlurProg.uniforms.texelSize, 0, target.texelSizeY);
    gl.uniform1i(bBlurProg.uniforms.uTexture, temp.attach(0));
    blit(target);
  }
}

  CFG.COLOR_MODE = 'custom';
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-mode="custom"]').classList.add('active');
});

// Actions
document.getElementById('btn-splat').addEventListener('click', () => {
  multipleSplats(parseInt(Math.random() * 8) + 4);
});
document.getElementById('btn-clear').addEventListener('click', () => {
  // clear dye and velocity
  clearProg.bind();
  gl.uniform1i(clearProg.uniforms.uTexture, dye.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value, 0);
  blit(dye.write); dye.swap();
  gl.uniform1i(clearProg.uniforms.uTexture, dye.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value, 0);
  blit(dye.write); dye.swap();

  gl.uniform1i(clearProg.uniforms.uTexture, velocity.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value, 0);
  blit(velocity.write); velocity.swap();
  gl.uniform1i(clearProg.uniforms.uTexture, velocity.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value, 0);
  blit(velocity.write); velocity.swap();
});

// Presets
document.getElementById('preset-select').addEventListener('change', e => {
  const key = e.target.value;
  if (!key) return;
  const p = PRESETS[key];
  Object.assign(CFG, p);
  // update UI sliders/toggles to reflect
  const syncSlider = (id, val, decimals) => {
    const el = document.getElementById(id);
    if (el) { el.value = val; const vid = id+'-val'; const vel = document.getElementById(vid); if(vel) vel.textContent = parseFloat(val).toFixed(decimals); }
  };
  syncSlider('vort', CFG.CURL, 1);
  syncSlider('diss', CFG.DENSITY_DISSIPATION, 3);
  syncSlider('auto-rate', CFG.AUTO_RATE, 1);
  syncSlider('auto-count', CFG.AUTO_COUNT, 0);
  syncSlider('bloom-thresh', CFG.BLOOM_THRESHOLD, 2);
  syncSlider('sunray-w', CFG.SUNRAYS_WEIGHT, 2);
  // sync toggles
  const setToggle = (id, val) => { const el = document.getElementById(id); if(!el) return; val ? el.classList.add('on') : el.classList.remove('on'); };
  setToggle('toggle-bloom', CFG.BLOOM);
  setToggle('toggle-shading', CFG.SHADING);
  setToggle('toggle-sunrays', CFG.SUNRAYS);
  // color mode
  if (CFG.COLOR_MODE) {
    document.querySelectorAll('[data-mode]').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === CFG.COLOR_MODE);
    });
  }
});

// Toggle panel
const panel = document.getElementById('panel');
const toggleBtn = document.getElementById('toggle-btn');
let panelVisible = true;
toggleBtn.addEventListener('click', () => {
  panelVisible = !panelVisible;
  panel.classList.toggle('hidden', !panelVisible);
});
</script>
